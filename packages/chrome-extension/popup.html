<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e0e0e0;
    }
    .header img { width: 32px; height: 32px; }
    .header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    .actions { display: flex; flex-direction: column; gap: 8px; }
    button {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
      transition: background 0.15s;
    }
    button:hover { background: #f5f5f5; }
    button:active { background: #ebebeb; }
    .btn-label { font-weight: 500; }
    .btn-desc { color: #666; font-size: 12px; }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      color: #666;
      text-align: center;
    }
    .status.connected { color: #2ead33; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon-48.png" alt="copilotbrowser">
    <h1>copilotbrowser</h1>
  </div>
  <div class="actions">
    <button id="record">
      <div>
        <div class="btn-label">Record Test</div>
        <div class="btn-desc">Record actions as a copilotbrowser test</div>
      </div>
    </button>
    <button id="inspect">
      <div>
        <div class="btn-label">Inspect Selectors</div>
        <div class="btn-desc">Pick elements and generate selectors</div>
      </div>
    </button>
    <button id="trace">
      <div>
        <div class="btn-label">View Trace</div>
        <div class="btn-desc">Open trace viewer for test results</div>
      </div>
    </button>
  </div>
  <div id="status" class="status">Ready</div>
  <script src="popup.js"></script>
</body>
</html>
